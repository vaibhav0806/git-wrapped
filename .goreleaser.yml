version: 2

builds:
  - binary: git-wrapped
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip

brews:
  - repository:
      owner: vaibhav0806
      name: homebrew-tap
    homepage: https://github.com/vaibhav0806/git-wrapped
    description: "Spotify Wrapped, but for your GitHub year"
    license: MIT
    install: |
      bin.install "git-wrapped"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
